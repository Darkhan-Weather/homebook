<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --ink:#16302B;
    --paper:#EEF1EC;
    --surface:#FFFFFF;
    --line:#DCE2DA;
    --muted:#6B7A72;
    --accent:#2F9E77;
    --amber:#E0A458;
    --c-huns:#2F9E77;
    --c-teever:#4A80C4;
    --c-ayalal:#E0A458;
    --c-huuhed:#D26A7C;
    --c-ajil:#8069B8;
    --shadow:0 1px 2px rgba(22,48,43,.06),0 8px 24px rgba(22,48,43,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--paper);color:var(--ink);
    padding:16px;line-height:1.4;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:440px;margin:0 auto}

  header{margin-bottom:18px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
  h1{font-size:23px;font-weight:800;letter-spacing:-.02em;margin-top:3px}

  .monthbar{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:8px 10px;margin:14px 0;box-shadow:var(--shadow);
  }
  .monthbar button{
    border:none;background:var(--paper);color:var(--ink);
    width:34px;height:34px;border-radius:9px;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .monthbar button:hover{background:var(--line)}
  .monthbar .mlabel{font-weight:700;font-size:15px}

  .total{
    background:var(--ink);color:#fff;border-radius:16px;padding:16px 18px;
    margin-bottom:14px;box-shadow:var(--shadow);
  }
  .total .lbl{font-size:12px;color:#B4C6BE;letter-spacing:.04em}
  .total .amt{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
  .total .amt span{font-size:18px;font-weight:700;color:#8FB3A8;margin-left:2px}

  .split{display:flex;height:12px;border-radius:8px;overflow:hidden;margin-top:14px;background:#22463F}
  .split i{display:block;height:100%}

  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:14px;box-shadow:var(--shadow);
  }
  .card h2{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:700}

  .field{margin-bottom:11px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  input,select{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;
    font-size:15px;font-family:inherit;color:var(--ink);background:#fff;
  }
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}

  .cats{display:flex;flex-wrap:wrap;gap:7px}
  .cat{
    border:1px solid var(--line);background:#fff;border-radius:20px;
    padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:.15s;color:var(--ink);
  }
  .cat .dot{width:9px;height:9px;border-radius:50%}
  .cat.on{color:#fff;border-color:transparent}

  .addbtn{
    width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;
    padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:.15s;
  }
  .addbtn:hover{filter:brightness(1.05)}
  .addbtn:active{transform:scale(.99)}

  .sumrow{
    display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--paper);
  }
  .sumrow:last-child{border-bottom:none}
  .sumrow .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .sumrow .nm{font-weight:600;font-size:14px;flex:1}
  .sumrow .ct{font-size:12px;color:var(--muted);background:var(--paper);padding:2px 8px;border-radius:10px}
  .sumrow .vl{font-weight:700;font-size:14px}

  .list .item{
    display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--paper);
  }
  .list .item:last-child{border-bottom:none}
  .list .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .list .meta{flex:1;min-width:0}
  .list .meta .c{font-weight:600;font-size:14px}
  .list .meta .d{font-size:12px;color:var(--muted)}
  .list .v{font-weight:700;font-size:14px;white-space:nowrap}
  .list .del{
    border:none;background:none;color:var(--muted);cursor:pointer;font-size:17px;
    width:26px;height:26px;border-radius:7px;flex-shrink:0;
  }
  .list .del:hover{background:#F6E7EA;color:var(--c-huuhed)}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:22px 0}
  .empty .big{font-size:30px;margin-bottom:6px}
</style>

<div class="wrap">
  <header>
    <div class="eyebrow">F · Хувьсах зардал</div>
    <h1>Зардлын хяналт</h1>
  </header>

  <div class="monthbar">
    <button id="prev" aria-label="Өмнөх сар">‹</button>
    <div class="mlabel" id="mlabel">—</div>
    <button id="next" aria-label="Дараах сар">›</button>
  </div>

  <div class="total">
    <div class="lbl">Энэ сарын нийт зардал</div>
    <div class="amt" id="totalAmt">0<span>₮</span></div>
    <div class="split" id="split"></div>
  </div>

  <div class="card">
    <h2>Зардал нэмэх</h2>
    <div class="field">
      <label for="date">Огноо</label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label>Ангилал</label>
      <div class="cats" id="cats"></div>
    </div>
    <div class="field">
      <label for="amount">Дүн (₮)</label>
      <input type="number" id="amount" inputmode="numeric" placeholder="0" min="0">
    </div>
    <button class="addbtn" id="add">+ Нэмэх</button>
  </div>

  <div class="card">
    <h2>Ангиллаар нэгтгэл</h2>
    <div id="summary"></div>
  </div>

  <div class="card">
    <h2>Бичилтүүд</h2>
    <div class="list" id="list"></div>
  </div>
</div>

<script>
const CATS = [
  {id:'huns',   name:'Хүнс',   color:'var(--c-huns)',   hex:'#2F9E77'},
  {id:'teever', name:'Тээвэр', color:'var(--c-teever)', hex:'#4A80C4'},
  {id:'ayalal', name:'Аялал',  color:'var(--c-ayalal)', hex:'#E0A458'},
  {id:'huuhed', name:'Хүүхэд', color:'var(--c-huuhed)', hex:'#D26A7C'},
  {id:'ajil',   name:'Ажил',   color:'var(--c-ajil)',   hex:'#8069B8'},
];
const MONTHS = ['1-р сар','2-р сар','3-р сар','4-р сар','5-р сар','6-р сар','7-р сар','8-р сар','9-р сар','10-р сар','11-р сар','12-р сар'];

let expenses = [];
let selectedCat = 'huns';
let viewDate = new Date();

const catById = id => CATS.find(c => c.id === id) || {name:'?',hex:'#999'};
const fmt = n => n.toLocaleString('en-US');
const ym = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');

async function load(){
  try{
    const r = await window.storage.get('expenses');
    if(r && r.value) expenses = JSON.parse(r.value);
  }catch(e){ expenses = []; }
  render();
}
async function save(){
  try{ await window.storage.set('expenses', JSON.stringify(expenses)); }
  catch(e){ console.error('Хадгалахад алдаа', e); }
}

function buildCats(){
  const wrap = document.getElementById('cats');
  wrap.innerHTML = '';
  CATS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'cat' + (c.id===selectedCat?' on':'');
    b.style.background = c.id===selectedCat ? c.hex : '#fff';
    b.innerHTML = `<span class="dot" style="background:${c.hex}"></span>${c.name}`;
    b.onclick = ()=>{ selectedCat = c.id; buildCats(); };
    wrap.appendChild(b);
  });
}

function currentMonthExpenses(){
  const key = ym(viewDate);
  return expenses.filter(e => e.date.slice(0,7) === key);
}

function render(){
  document.getElementById('mlabel').textContent =
    viewDate.getFullYear()+' · '+MONTHS[viewDate.getMonth()];

  const mine = currentMonthExpenses();
  const total = mine.reduce((s,e)=>s+e.amount,0);
  document.getElementById('totalAmt').innerHTML = fmt(total)+'<span>₮</span>';

  // split bar
  const split = document.getElementById('split');
  split.innerHTML = '';
  if(total>0){
    CATS.forEach(c=>{
      const sum = mine.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0);
      if(sum>0){
        const i = document.createElement('i');
        i.style.width = (sum/total*100)+'%';
        i.style.background = c.hex;
        split.appendChild(i);
      }
    });
  }

  // summary
  const sum = document.getElementById('summary');
  sum.innerHTML = '';
  const totals = CATS.map(c=>({
    ...c,
    sum: mine.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0),
    count: mine.filter(e=>e.category===c.id).length
  })).sort((a,b)=>b.sum-a.sum);

  if(total===0){
    sum.innerHTML = '<div class="empty">Энэ сард бичилт алга</div>';
  } else {
    totals.filter(t=>t.sum>0).forEach(t=>{
      const row = document.createElement('div');
      row.className = 'sumrow';
      row.innerHTML =
        `<span class="dot" style="background:${t.hex}"></span>`+
        `<span class="nm">${t.name}</span>`+
        `<span class="ct">${t.count}</span>`+
        `<span class="vl">${fmt(t.sum)}₮</span>`;
      sum.appendChild(row);
    });
  }

  // list
  const list = document.getElementById('list');
  list.innerHTML = '';
  const sorted = [...mine].sort((a,b)=> b.date.localeCompare(a.date) || b.id-a.id);
  if(sorted.length===0){
    list.innerHTML = '<div class="empty"><div class="big">🧾</div>Дээрх талбараас зардлаа нэмнэ үү</div>';
  } else {
    sorted.forEach(e=>{
      const c = catById(e.category);
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML =
        `<span class="dot" style="background:${c.hex}"></span>`+
        `<div class="meta"><div class="c">${c.name}</div><div class="d">${e.date}</div></div>`+
        `<div class="v">${fmt(e.amount)}₮</div>`+
        `<button class="del" title="Устгах">×</button>`;
      item.querySelector('.del').onclick = ()=>{
        expenses = expenses.filter(x=>x.id!==e.id);
        save(); render();
      };
      list.appendChild(item);
    });
  }
}

document.getElementById('add').onclick = ()=>{
  const date = document.getElementById('date').value;
  const amount = parseInt(document.getElementById('amount').value,10);
  if(!date){ alert('Огноогоо сонгоно уу'); return; }
  if(!amount || amount<=0){ alert('Дүнгээ оруулна уу'); return; }
  expenses.push({ id:Date.now(), date, category:selectedCat, amount });
  document.getElementById('amount').value='';
  save();
  // jump view to the month of the added expense
  const d = new Date(date+'T00:00');
  viewDate = new Date(d.getFullYear(), d.getMonth(), 1);
  render();
};

document.getElementById('prev').onclick = ()=>{
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1); render();
};
document.getElementById('next').onclick = ()=>{
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1); render();
};

// init
document.getElementById('date').value = new Date().toISOString().slice(0,10);
buildCats();
load();
</script>
